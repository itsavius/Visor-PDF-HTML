<script type="module">
  // ── Importar PDF.js desde CDN confiable (cdnjs.cloudflare.com) ──
  import * as pdfjsLib from 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/4.9.155/pdf.min.mjs';

  // Worker también desde CDN
  pdfjsLib.GlobalWorkerOptions.workerSrc =
    'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/4.9.155/pdf.worker.min.mjs';

  // ── Estado global ──
  let pdfDoc       = null;
  let currentPage  = 1;
  let currentScale = 1.0;
  let rotation     = 0;
  let renderTask   = null;
  let currentFileBytes = null;
  let passwordResolve = null;
  let sidebarVisible  = false;
  let findController  = null;
  let eventBus        = null;

  // ── Referencias DOM ──
  const $  = id => document.getElementById(id);
  const viewerContainer = $('viewerContainer');
  const sidebar         = $('sidebar');
  const dropZone        = $('dropZone');
  const loadingOverlay  = $('loadingOverlay');
  const loadingText     = $('loadingText');
  const numPages        = $('numPages');
  const pageNumber      = $('pageNumber');
  const scaleSelect     = $('scaleSelect');
  const findbar         = $('findbar');
  const findInput       = $('findInput');
  const findMsg         = $('findMsg');
  const errorToast      = $('errorToast');

  // ── Utilidades ──
  function showLoading(msg = 'Cargando PDF…') {
    loadingText.textContent = msg;
    loadingOverlay.classList.remove('hidden');
  }
  function hideLoading() {
    loadingOverlay.classList.add('hidden');
  }
  function showError(msg) {
    errorToast.textContent = msg;
    errorToast.classList.add('visible');
    setTimeout(() => errorToast.classList.remove('visible'), 4000);
  }
  function setControlsEnabled(enabled) {
    ['prevPage','nextPage','firstPage','lastPage',
     'zoomIn','zoomOut','rotateCw','rotateCcw',
     'findBtn','printBtn','downloadBtn','presentationBtn',
     'pageNumber','scaleSelect'].forEach(id => {
      const el = $(id);
      if (el) el.disabled = !enabled;
    });
  }

  // ── Calcular escala según modo ──
  function resolveScale(val) {
    if (!pdfDoc) return 1;
    const page = pdfDoc.numPages ? currentPage : 1;
    if (val === 'auto' || val === 'page-fit') {
      const vw = viewerContainer.clientWidth  - 32;
      const vh = viewerContainer.clientHeight - 32;
      return Math.min(vw / 595, vh / 842);   // A4 approx
    }
    if (val === 'page-width') {
      return (viewerContainer.clientWidth - 32) / 595;
    }
    return parseFloat(val) || 1;
  }

  // ── Renderizar una página en su canvas ──
  async function renderPage(pageNum, scale, rot) {
    if (!pdfDoc) return;
    const page      = await pdfDoc.getPage(pageNum);
    const viewport  = page.getViewport({ scale, rotation: rot });

    // Obtener o crear wrapper
    let wrapper = document.getElementById(`page-${pageNum}`);
    if (!wrapper) {
      wrapper = document.createElement('div');
      wrapper.className = 'pageWrapper';
      wrapper.id = `page-${pageNum}`;
      viewerContainer.appendChild(wrapper);
    }
    wrapper.style.width  = viewport.width  + 'px';
    wrapper.style.height = viewport.height + 'px';

    // Canvas
    let canvas = wrapper.querySelector('canvas');
    if (!canvas) { canvas = document.createElement('canvas'); wrapper.appendChild(canvas); }
    const ctx = canvas.getContext('2d');
    const dpr = window.devicePixelRatio || 1;
    canvas.width  = Math.floor(viewport.width  * dpr);
    canvas.height = Math.floor(viewport.height * dpr);
    canvas.style.width  = viewport.width  + 'px';
    canvas.style.height = viewport.height + 'px';
    ctx.scale(dpr, dpr);

    // Capa de texto
    let textLayerDiv = wrapper.querySelector('.textLayer');
    if (!textLayerDiv) {
      textLayerDiv = document.createElement('div');
      textLayerDiv.className = 'textLayer';
      wrapper.appendChild(textLayerDiv);
    }
    textLayerDiv.style.width  = viewport.width  + 'px';
    textLayerDiv.style.height = viewport.height + 'px';
    textLayerDiv.innerHTML = '';

    if (renderTask) { try { renderTask.cancel(); } catch(e){} }

    renderTask = page.render({ canvasContext: ctx, viewport });
    await renderTask.promise;

    // Renderizar capa de texto para selección/búsqueda
    try {
      const textContent = await page.getTextContent();
      const textLayer = new pdfjsLib.TextLayer({
        textContentSource: textContent,
        container: textLayerDiv,
        viewport,
      });
      await textLayer.render();
    } catch(e) {
      // TextLayer opcional, no bloquea
    }
  }

  // ── Cargar PDF ──
  async function loadPDF(source, password) {
    showLoading('Cargando PDF…');
    try {
      const loadingTask = pdfjsLib.getDocument(
        typeof source === 'string'
          ? { url: source, password: password || '' }
          : { data: source, password: password || '' }
      );

      loadingTask.onPassword = (updateCb, reason) => {
        $('passwordDialog').classList.add('visible');
        passwordResolve = (pwd) => {
          $('passwordDialog').classList.remove('visible');
          updateCb(pwd);
        };
      };

      pdfDoc = await loadingTask.promise;

      // Limpiar viewer
      viewerContainer.querySelectorAll('.pageWrapper').forEach(e => e.remove());
      sidebar.innerHTML = '';
      dropZone.classList.add('hidden');
      currentPage = 1;

      // Actualizar UI
      pageNumber.value = 1;
      pageNumber.max   = pdfDoc.numPages;
      numPages.textContent = `/ ${pdfDoc.numPages}`;
      setControlsEnabled(true);

      // Escala inicial
      const sv = scaleSelect.value;
      currentScale = resolveScale(sv === 'auto' || sv === 'page-fit' || sv === 'page-width' ? sv : '1');
      if (!['auto','page-fit','page-width'].includes(sv)) scaleSelect.value = '1';

      showLoading('Renderizando páginas…');

      // Renderizar todas las páginas
      for (let i = 1; i <= pdfDoc.numPages; i++) {
        loadingText.textContent = `Renderizando página ${i} de ${pdfDoc.numPages}…`;
        await renderPage(i, currentScale, rotation);
        buildThumb(i);
      }

      hideLoading();
      scrollToPage(1);

    } catch (err) {
      hideLoading();
      if (err.name !== 'PasswordException') {
        showError('Error al cargar el PDF: ' + (err.message || err));
        dropZone.classList.remove('hidden');
      }
    }
  }

  // ── Re-renderizar todas las páginas (zoom/rotación) ──
  async function reRenderAll() {
    if (!pdfDoc) return;
    showLoading('Aplicando cambios…');
    for (let i = 1; i <= pdfDoc.numPages; i++) {
      loadingText.textContent = `Renderizando página ${i}…`;
      const wrapper = document.getElementById(`page-${i}`);
      if (wrapper) {
        wrapper.innerHTML = '';
        wrapper.style.width = wrapper.style.height = '';
      }
      await renderPage(i, currentScale, rotation);
    }
    hideLoading();
    scrollToPage(currentPage);
  }

  // ── Construir miniatura en sidebar ──
  async function buildThumb(pageNum) {
    const page     = await pdfDoc.getPage(pageNum);
    const vp       = page.getViewport({ scale: 0.18 });
    const canvas   = document.createElement('canvas');
    canvas.width   = Math.floor(vp.width);
    canvas.height  = Math.floor(vp.height);
    const ctx      = canvas.getContext('2d');
    await page.render({ canvasContext: ctx, viewport: vp }).promise;

    const item = document.createElement('div');
    item.className = 'thumbItem';
    item.dataset.page = pageNum;
    item.appendChild(canvas);
    const lbl = document.createElement('span');
    lbl.textContent = pageNum;
    item.appendChild(lbl);
    item.addEventListener('click', () => {
      currentPage = pageNum;
      pageNumber.value = pageNum;
      scrollToPage(pageNum);
      updateActiveThumb();
    });
    sidebar.appendChild(item);

    if (pageNum === 1) item.classList.add('active');
  }

  function updateActiveThumb() {
    sidebar.querySelectorAll('.thumbItem').forEach(t => {
      t.classList.toggle('active', parseInt(t.dataset.page) === currentPage);
    });
  }

  // ── Scroll a una página específica ──
  function scrollToPage(pageNum) {
    const el = document.getElementById(`page-${pageNum}`);
    if (el) el.scrollIntoView({ behavior: 'smooth', block: 'start' });
  }

  // ── Detectar página visible al hacer scroll ──
  function detectVisiblePage() {
    if (!pdfDoc) return;
    const wrappers = viewerContainer.querySelectorAll('.pageWrapper');
    const cTop = viewerContainer.scrollTop;
    const cBot = cTop + viewerContainer.clientHeight;
    let best = 1, bestVis = 0;
    wrappers.forEach(w => {
      const wTop = w.offsetTop, wBot = wTop + w.offsetHeight;
      const vis  = Math.max(0, Math.min(wBot, cBot) - Math.max(wTop, cTop));
      if (vis > bestVis) { bestVis = vis; best = parseInt(w.id.split('-')[1]); }
    });
    if (best !== currentPage) {
      currentPage = best;
      pageNumber.value = best;
      updateActiveThumb();
    }
  }

  // ── Aplicar zoom ──
  async function applyScale(val) {
    currentScale = resolveScale(val);
    await reRenderAll();
  }

  // ── Búsqueda simple en texto ──
  let searchMatches = [], searchIndex = -1;

  async function doSearch(query, matchCase, highlightAll) {
    searchMatches = [];
    searchIndex   = -1;
    if (!pdfDoc || !query) { findMsg.textContent = ''; return; }

    const flags = matchCase ? 'g' : 'gi';
    const re    = new RegExp(query.replace(/[.*+?^${}()|[\]\\]/g, '\\$&'), flags);

    // Buscar en todas las páginas
    for (let i = 1; i <= pdfDoc.numPages; i++) {
      const page    = await pdfDoc.getPage(i);
      const content = await page.getTextContent();
      const text    = content.items.map(it => it.str).join('');
      if (re.test(text)) searchMatches.push(i);
    }

    findMsg.textContent = searchMatches.length
      ? `${searchMatches.length} página(s) con coincidencias`
      : 'Sin resultados';

    if (searchMatches.length) {
      searchIndex = 0;
      scrollToPage(searchMatches[0]);
      currentPage = searchMatches[0];
      pageNumber.value = searchMatches[0];
    }
  }

  function findNavigate(dir) {
    if (!searchMatches.length) return;
    searchIndex = (searchIndex + dir + searchMatches.length) % searchMatches.length;
    const pg = searchMatches[searchIndex];
    scrollToPage(pg);
    currentPage = pg;
    pageNumber.value = pg;
    updateActiveThumb();
  }

  // ══════════════════════════════════════════
  //  EVENTOS
  // ══════════════════════════════════════════

  // Abrir archivo
  $('openFileBtn').addEventListener('click', () => $('fileInput').click());
  $('fileInput').addEventListener('change', e => {
    const file = e.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = ev => {
      currentFileBytes = ev.target.result;
      loadPDF(new Uint8Array(currentFileBytes));
    };
    reader.readAsArrayBuffer(file);
    e.target.value = '';
  });

  // Drag & drop
  viewerContainer.addEventListener('dragover', e => { e.preventDefault(); viewerContainer.style.outline = '2px dashed var(--accent)'; });
  viewerContainer.addEventListener('dragleave', () => { viewerContainer.style.outline = ''; });
  viewerContainer.addEventListener('drop', e => {
    e.preventDefault();
    viewerContainer.style.outline = '';
    const file = e.dataTransfer.files[0];
    if (!file || file.type !== 'application/pdf') { showError('Solo se aceptan archivos PDF'); return; }
    const reader = new FileReader();
    reader.onload = ev => {
      currentFileBytes = ev.target.result;
      loadPDF(new Uint8Array(currentFileBytes));
    };
    reader.readAsArrayBuffer(file);
  });

  // Sidebar toggle
  $('sidebarToggle').addEventListener('click', () => {
    sidebarVisible = !sidebarVisible;
    sidebar.classList.toggle('visible', sidebarVisible);
  });

  // Navegación
  $('firstPage').addEventListener('click', () => { currentPage = 1; pageNumber.value = 1; scrollToPage(1); updateActiveThumb(); });
  $('lastPage').addEventListener('click',  () => { currentPage = pdfDoc.numPages; pageNumber.value = currentPage; scrollToPage(currentPage); updateActiveThumb(); });
  $('prevPage').addEventListener('click',  () => { if (currentPage > 1) { currentPage--; pageNumber.value = currentPage; scrollToPage(currentPage); updateActiveThumb(); } });
  $('nextPage').addEventListener('click',  () => { if (pdfDoc && currentPage < pdfDoc.numPages) { currentPage++; pageNumber.value = currentPage; scrollToPage(currentPage); updateActiveThumb(); } });

  pageNumber.addEventListener('change', () => {
    let pg = parseInt(pageNumber.value);
    if (!pdfDoc) return;
    pg = Math.max(1, Math.min(pg, pdfDoc.numPages));
    pageNumber.value = pg;
    currentPage = pg;
    scrollToPage(pg);
    updateActiveThumb();
  });

  // Scroll para detectar página visible
  viewerContainer.addEventListener('scroll', detectVisiblePage, { passive: true });

  // Zoom
  $('zoomIn').addEventListener('click',  () => { currentScale = Math.min(currentScale * 1.25, 5); scaleSelect.value = currentScale; reRenderAll(); });
  $('zoomOut').addEventListener('click', () => { currentScale = Math.max(currentScale * 0.8,  0.1); scaleSelect.value = currentScale; reRenderAll(); });
  scaleSelect.addEventListener('change', e => applyScale(e.target.value));

  // Rotación
  $('rotateCw').addEventListener('click',  () => { rotation = (rotation + 90)  % 360; reRenderAll(); });
  $('rotateCcw').addEventListener('click', () => { rotation = (rotation - 90 + 360) % 360; reRenderAll(); });

  // Búsqueda
  $('findBtn').addEventListener('click', () => {
    findbar.classList.toggle('visible');
    if (findbar.classList.contains('visible')) findInput.focus();
  });
  $('findClose').addEventListener('click', () => findbar.classList.remove('visible'));
  $('findNext').addEventListener('click',  () => findNavigate(1));
  $('findPrev').addEventListener('click',  () => findNavigate(-1));

  let findTimer;
  findInput.addEventListener('input', () => {
    clearTimeout(findTimer);
    findTimer = setTimeout(() => {
      $('findNext').disabled = false;
      $('findPrev').disabled = false;
      doSearch(findInput.value, $('findMatchCase').checked, $('findHighlightAll').checked);
    }, 400);
  });
  findInput.addEventListener('keydown', e => {
    if (e.key === 'Enter')  findNavigate(e.shiftKey ? -1 : 1);
    if (e.key === 'Escape') findbar.classList.remove('visible');
  });

  // Atajos de teclado globales
  document.addEventListener('keydown', e => {
    if (e.ctrlKey && e.key === 'f') { e.preventDefault(); $('findBtn').click(); }
    if (!pdfDoc) return;
    if (document.activeElement === pageNumber || document.activeElement === findInput) return;
    if (e.key === 'ArrowRight' || e.key === 'ArrowDown') $('nextPage').click();
    if (e.key === 'ArrowLeft'  || e.key === 'ArrowUp')   $('prevPage').click();
    if (e.key === 'Home') $('firstPage').click();
    if (e.key === 'End')  $('lastPage').click();
    if (e.key === '+' || e.key === '=') $('zoomIn').click();
    if (e.key === '-') $('zoomOut').click();
  });

  // Imprimir
  $('printBtn').addEventListener('click', () => window.print());

  // Descargar
  $('downloadBtn').addEventListener('click', () => {
    if (!currentFileBytes) return;
    const blob = new Blob([currentFileBytes], { type: 'application/pdf' });
    const url  = URL.createObjectURL(blob);
    const a    = document.createElement('a');
    a.href = url; a.download = 'documento.pdf'; a.click();
    URL.revokeObjectURL(url);
  });

  // Presentación (pantalla completa)
  $('presentationBtn').addEventListener('click', () => {
    if (!document.fullscreenElement) viewerContainer.requestFullscreen?.();
    else document.exitFullscreen?.();
  });

  // Contraseña
  $('passwordOk').addEventListener('click', () => {
    if (passwordResolve) passwordResolve($('passwordInput').value);
    $('passwordInput').value = '';
  });
  $('passwordCancel').addEventListener('click', () => {
    $('passwordDialog').classList.remove('visible');
    passwordResolve = null;
  });
  $('passwordInput').addEventListener('keydown', e => { if (e.key === 'Enter') $('passwordOk').click(); });

  // Resize: re-renderizar si es auto/page-fit/page-width
  let resizeTimer;
  window.addEventListener('resize', () => {
    clearTimeout(resizeTimer);
    resizeTimer = setTimeout(() => {
      const sv = scaleSelect.value;
      if (['auto','page-fit','page-width'].includes(sv)) applyScale(sv);
    }, 300);
  });

  // ── Leer parámetro ?file= de la URL para carga automática ──
  const urlParams = new URLSearchParams(location.search);
  const fileParam = urlParams.get('file');
  if (fileParam) loadPDF(fileParam);
</script>

</body>
</html>
